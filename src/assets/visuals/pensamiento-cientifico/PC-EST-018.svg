<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--text)" />
    </marker>
  </defs>

  <text x="100" y="20" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">Estudiante 1: A sobre B</text>
  <path d="M60,50 L140,50 L140,90 Q140,100 130,100 L70,100 Q60,100 60,90 Z" fill="none" stroke="var(--text)" stroke-width="2" />
  <text x="100" y="78" fill="var(--text)" font-size="13" font-weight="500" text-anchor="middle">B</text>
  <line x1="100" y1="30" x2="100" y2="48" stroke="var(--text)" stroke-width="2" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="100" y="22" fill="var(--accent)" font-size="12" font-weight="500" text-anchor="middle">A</text>
  <circle cx="100" cy="120" r="14" fill="none" stroke="var(--exito)" stroke-width="2" />
  <circle cx="94" cy="126" r="3" fill="var(--exito)" />
  <circle cx="106" cy="114" r="3" fill="var(--exito)" />
  <text x="100" y="150" fill="var(--exito)" font-size="11" font-weight="700" text-anchor="middle">reacción gradual</text>

  <text x="300" y="20" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">Estudiante 2: B sobre A</text>
  <path d="M260,50 L340,50 L340,90 Q340,100 330,100 L270,100 Q260,100 260,90 Z" fill="none" stroke="var(--text)" stroke-width="2" />
  <text x="300" y="78" fill="var(--text)" font-size="13" font-weight="500" text-anchor="middle">A</text>
  <line x1="300" y1="30" x2="300" y2="48" stroke="var(--text)" stroke-width="2" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="300" y="22" fill="var(--accent)" font-size="12" font-weight="500" text-anchor="middle">B</text>
  <circle cx="300" cy="120" r="20" fill="none" stroke="var(--warning)" stroke-width="2" />
  <circle cx="288" cy="130" r="4" fill="var(--warning)" />
  <circle cx="312" cy="108" r="4" fill="var(--warning)" />
  <circle cx="300" cy="105" r="4" fill="var(--warning)" />
  <circle cx="315" cy="128" r="3" fill="var(--warning)" />
  <text x="300" y="155" fill="var(--warning)" font-size="11" font-weight="700" text-anchor="middle">reacción vigorosa</text>

  <line x1="180" y1="90" x2="220" y2="90" stroke="var(--text-faint)" stroke-width="2" stroke-linecap="round" stroke-dasharray="5,5" />
  <text x="200" y="195" fill="var(--text-faint)" font-size="10" font-weight="500" text-anchor="middle">mismas sustancias y cantidades → resultados distintos</text>

</svg>