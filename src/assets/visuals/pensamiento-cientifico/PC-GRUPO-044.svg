  <circle cx="335" cy="110" r="5" fill="var(--warning)" />
  <circle cx="300" cy="50" r="5" fill="var(--warning)" />
  <circle cx="265" cy="130" r="5" fill="var(--warning)" />
  <line x1="335" y1="110" x2="300" y2="50" stroke="var(--warning)" stroke-width="1" stroke-linecap="round" stroke-dasharray="5,5" />
  <line x1="300" y1="50" x2="265" y2="130" stroke="var(--warning)" stroke-width="1" stroke-linecap="round" stroke-dasharray="5,5" />
  <text x="300" y="190" fill="var(--warning)" font-size="11" font-weight="500" text-anchor="middle">3 electrones interactúan entre sí</text>

