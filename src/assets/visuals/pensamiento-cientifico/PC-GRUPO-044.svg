  </defs>

  <text x="100" y="20" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">Hidrógeno (Z=1)</text>
  <circle cx="100" cy="110" r="8" fill="var(--text)" />
  <circle cx="100" cy="110" r="60" fill="none" stroke="var(--border)" stroke-width="2" />
  <circle cx="160" cy="110" r="5" fill="var(--accent)" />
  <text x="100" y="190" fill="var(--exito)" font-size="11" font-weight="500" text-anchor="middle">modelo de Bohr aplica bien</text>

  <text x="300" y="20" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">Litio (Z=3)</text>
