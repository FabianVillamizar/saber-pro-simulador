<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--text)" />
    </marker>
  </defs>

  <text x="100" y="18" fill="var(--warning)" font-size="12" font-weight="800" text-anchor="middle">✗ Incorrecto</text>
  <rect x="20" y="30" width="160" height="60" rx="8" fill="none" stroke="var(--warning)" stroke-width="2" />
  <text x="100" y="55" fill="var(--text)" font-size="11" font-weight="500" text-anchor="middle">Grupo A · zona 1</text>
  <text x="100" y="75" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">con fertilizante</text>
  <rect x="20" y="100" width="160" height="60" rx="8" fill="none" stroke="var(--warning)" stroke-width="2" />
  <text x="100" y="125" fill="var(--text)" font-size="11" font-weight="500" text-anchor="middle">Grupo B · zona 2</text>
  <text x="100" y="145" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">sin fertilizante</text>
  <text x="100" y="178" fill="var(--warning)" font-size="10" font-weight="500" text-anchor="middle">zona y tratamiento se mezclan</text>

  <text x="300" y="18" fill="var(--exito)" font-size="12" font-weight="800" text-anchor="middle">✓ Correcto</text>
  <rect x="220" y="30" width="160" height="60" rx="8" fill="none" stroke="var(--exito)" stroke-width="2" />
  <text x="300" y="55" fill="var(--text)" font-size="11" font-weight="500" text-anchor="middle">Mismas parcelas</text>
  <text x="300" y="75" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">Tiempo 1: sin fertilizante</text>
  <line x1="300" y1="90" x2="300" y2="98" stroke="var(--exito)" stroke-width="2" stroke-linecap="round" marker-end="url(#flecha)" />
  <rect x="220" y="100" width="160" height="60" rx="8" fill="none" stroke="var(--exito)" stroke-width="2" />
  <text x="300" y="125" fill="var(--text)" font-size="11" font-weight="500" text-anchor="middle">Mismas parcelas</text>
  <text x="300" y="145" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">Tiempo 2: con fertilizante</text>
  <text x="300" y="178" fill="var(--exito)" font-size="10" font-weight="500" text-anchor="middle">única variable: el tiempo/tratamiento</text>

</svg>