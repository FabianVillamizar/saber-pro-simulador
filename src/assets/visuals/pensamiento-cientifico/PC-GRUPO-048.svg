<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--text)" />
    </marker>
  </defs>

  <circle cx="60" cy="60" r="30" fill="var(--warning)" opacity="0.85" />
  <text x="60" y="105" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">Sol</text>
  <path d="M100,70 q15,-10 30,0 q15,10 30,0 q15,-10 30,0 q15,10 30,0" fill="none" stroke="var(--warning)" stroke-width="2" />
  <line x1="255" y1="70" x2="300" y2="100" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="190" y="55" fill="var(--text-sub)" font-size="10" font-weight="500" text-anchor="middle">radiación electromagnética (ondas)</text>
  <rect x="300" y="95" width="60" height="30" rx="4" fill="none" stroke="var(--text)" stroke-width="2" />
  <text x="330" y="145" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">satélite</text>
  <text x="200" y="185" fill="var(--text-faint)" font-size="10" font-weight="500" text-anchor="middle">vacío del espacio: sin medio material entre el Sol y el satélite</text>

</svg>