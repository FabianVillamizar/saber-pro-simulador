<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--accent)" />
    </marker>
  </defs>

  <circle cx="90" cy="100" r="16" fill="none" stroke="var(--text)" stroke-width="2" /><text x="90" y="104" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">N</text>
  <circle cx="60" cy="80" r="9" fill="none" stroke="var(--text-sub)" stroke-width="2" /><text x="60" y="84" text-anchor="middle" font-size="10" fill="var(--text-sub)">H</text>
  <circle cx="60" cy="120" r="9" fill="none" stroke="var(--text-sub)" stroke-width="2" /><text x="60" y="124" text-anchor="middle" font-size="10" fill="var(--text-sub)">H</text>
  <circle cx="120" cy="65" r="9" fill="none" stroke="var(--text-sub)" stroke-width="2" /><text x="120" y="69" text-anchor="middle" font-size="10" fill="var(--text-sub)">H</text>
  <text x="90" y="145" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">NH₃</text>

  <circle cx="300" cy="100" r="14" fill="none" stroke="var(--text)" stroke-width="2" /><text x="300" y="104" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">Cl</text>
  <circle cx="255" cy="100" r="9" fill="none" stroke="var(--text-sub)" stroke-width="2" /><text x="255" y="104" text-anchor="middle" font-size="10" fill="var(--text-sub)">H</text>
  <line x1="264" y1="100" x2="286" y2="100" stroke="var(--text)" stroke-width="2" stroke-linecap="round" />
  <text x="280" y="145" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">HCl</text>

  <path d="M255,100 Q200,60 130,80" fill="none" stroke="var(--accent)" stroke-width="2.5" marker-end="url(#flecha)" />
  <text x="190" y="55" fill="var(--accent)" font-size="11" font-weight="500" text-anchor="middle">H⁺ se transfiere (sin agua)</text>
  <text x="200" y="185" fill="var(--text-sub)" font-size="10" font-weight="500" text-anchor="middle">NH₃ + HCl → NH₄Cl (sólido) — ácido/base de Brønsted-Lowry</text>

</svg>