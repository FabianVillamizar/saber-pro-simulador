<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--text)" />
    </marker>
  </defs>

  <rect x="160" y="100" width="80" height="36" rx="8" fill="none" stroke="var(--text)" stroke-width="2" />
  <circle cx="180" cy="140" r="10" fill="none" stroke="var(--text)" stroke-width="2" />
  <circle cx="220" cy="140" r="10" fill="none" stroke="var(--text)" stroke-width="2" />
  <line x1="240" y1="118" x2="300" y2="118" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="270" y="105" fill="var(--accent)" font-size="11" font-weight="500" text-anchor="middle">Fuerza del motor</text>
  <line x1="160" y1="118" x2="100" y2="118" stroke="var(--warning)" stroke-width="3" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="130" y="105" fill="var(--warning)" font-size="11" font-weight="500" text-anchor="middle">Fricción + aire</text>
  <line x1="200" y1="40" x2="260" y2="40" stroke="var(--text-sub)" stroke-width="2" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="230" y="28" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">v = 100 km/h (constante)</text>
  <text x="200" y="180" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">fuerzas de igual magnitud → fuerza neta = 0</text>

</svg>