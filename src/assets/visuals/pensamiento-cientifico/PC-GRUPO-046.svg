<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--text)" />
    </marker>
  </defs>

  <rect x="170" y="20" width="20" height="170" rx="8" fill="var(--border)" stroke="var(--border)" stroke-width="2" />
  <text x="180" y="205" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">placa metálica</text>

  <line x1="40" y1="60" x2="165" y2="60" stroke="var(--text-sub)" stroke-width="2" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="100" y="48" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">frecuencia baja</text>
  <text x="100" y="80" fill="var(--text-faint)" font-size="10" font-weight="500" text-anchor="middle">(cualquier intensidad)</text>
  <text x="140" y="100" fill="var(--warning)" font-size="11" font-weight="500" text-anchor="middle">✗ sin emisión</text>

  <line x1="40" y1="150" x2="165" y2="150" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="100" y="138" fill="var(--accent)" font-size="11" font-weight="500" text-anchor="middle">frecuencia > umbral</text>
  <line x1="195" y1="150" x2="260" y2="130" stroke="var(--exito)" stroke-width="2" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="300" y="122" fill="var(--exito)" font-size="11" font-weight="500" text-anchor="middle">e⁻ emitido</text>

</svg>