<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--text)" />
    </marker>
  </defs>

  <text x="90" y="20" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">Antes (V)</text>
  <rect x="30" y="35" width="120" height="110" rx="8" fill="none" stroke="var(--border)" stroke-width="2" />
  <circle cx="81" cy="80" r="6" fill="var(--text-sub)" />
  <circle cx="99" cy="80" r="6" fill="var(--text-sub)" />
  <circle cx="81" cy="98" r="6" fill="var(--text-sub)" />
  <circle cx="99" cy="98" r="6" fill="var(--text-sub)" />
  <text x="90" y="165" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">4 moléculas de gas</text>

  <line x1="160" y1="90" x2="210" y2="90" stroke="var(--text)" stroke-width="3" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="185" y="78" fill="var(--accent)" font-size="12" font-weight="700" text-anchor="middle">V ↓ ½</text>

  <text x="300" y="20" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">Después (V/2)</text>
  <rect x="240" y="50" width="120" height="80" rx="8" fill="none" stroke="var(--text)" stroke-width="2" />
  <circle cx="291" cy="80" r="6" fill="var(--accent)" />
  <circle cx="309" cy="80" r="6" fill="var(--accent)" />
  <text x="300" y="155" fill="var(--accent)" font-size="11" font-weight="500" text-anchor="middle">2 moléculas de gas</text>

  <line x1="200" y1="195" x2="200" y2="195" stroke="var(--text)" stroke-width="2" stroke-linecap="round" />
  <text x="200" y="200" fill="var(--text-sub)" font-size="11" font-weight="500" text-anchor="middle">presión ↑ → el equilibrio se desplaza hacia los productos (NH₃)</text>

</svg>