<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--text)" />
    </marker>
  </defs>

  <text x="120" y="20" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">Diagrama de OM del O₂</text>
  <line x1="60" y1="200" x2="110" y2="200" stroke="var(--text)" stroke-width="2" stroke-linecap="round" /><text x="85" y="194" fill="var(--text-sub)" font-size="9" font-weight="500" text-anchor="middle">σ2p</text>
  <line x1="60" y1="172" x2="110" y2="172" stroke="var(--text)" stroke-width="2" stroke-linecap="round" /><text x="85" y="166" fill="var(--text-sub)" font-size="9" font-weight="500" text-anchor="middle">π2p (a)</text>
  <line x1="60" y1="144" x2="110" y2="144" stroke="var(--text)" stroke-width="2" stroke-linecap="round" /><text x="85" y="138" fill="var(--text-sub)" font-size="9" font-weight="500" text-anchor="middle">π2p (b)</text>
  <line x1="60" y1="116" x2="110" y2="116" stroke="var(--text)" stroke-width="2" stroke-linecap="round" /><text x="85" y="110" fill="var(--text-sub)" font-size="9" font-weight="500" text-anchor="middle">π2p* (a)</text>
  <line x1="60" y1="88" x2="110" y2="88" stroke="var(--text)" stroke-width="2" stroke-linecap="round" /><text x="85" y="82" fill="var(--text-sub)" font-size="9" font-weight="500" text-anchor="middle">π2p* (b)</text>
  <line x1="60" y1="60" x2="110" y2="60" stroke="var(--text)" stroke-width="2" stroke-linecap="round" /><text x="85" y="54" fill="var(--text-sub)" font-size="9" font-weight="500" text-anchor="middle">σ2p*</text>
  <circle cx="72" cy="88" r="4" fill="var(--warning)" />
  <circle cx="72" cy="116" r="4" fill="var(--warning)" />
  <text x="150" y="100" fill="var(--warning)" font-size="10" font-weight="500" text-anchor="start">2 electrones desapareados</text>
  <text x="150" y="114" fill="var(--warning)" font-size="10" font-weight="500" text-anchor="start">(uno en cada π2p*, Hund)</text>

  <text x="320" y="20" fill="var(--text)" font-size="12" font-weight="700" text-anchor="middle">Lewis simple</text>
  <line x1="290" y1="110" x2="350" y2="110" stroke="var(--text)" stroke-width="4" stroke-linecap="round" />
  <circle cx="290" cy="100" r="2" fill="var(--text)" /><circle cx="290" cy="120" r="2" fill="var(--text)" />
  <circle cx="350" cy="100" r="2" fill="var(--text)" /><circle cx="350" cy="120" r="2" fill="var(--text)" />
  <text x="320" y="145" fill="var(--text-sub)" font-size="10" font-weight="500" text-anchor="middle">O=O (todos apareados)</text>

</svg>