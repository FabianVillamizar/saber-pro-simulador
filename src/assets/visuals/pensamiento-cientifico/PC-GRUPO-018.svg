<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--text)" />
    </marker>
  </defs>

  <line x1="60" y1="20" x2="60" y2="220" stroke="var(--text)" stroke-width="2" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="30" y="40" fill="var(--text-sub)" font-size="12" font-weight="500" text-anchor="start">P (atm)</text>
  <line x1="60" y1="220" x2="380" y2="220" stroke="var(--text)" stroke-width="2" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="360" y="240" fill="var(--text-sub)" font-size="12" font-weight="500" text-anchor="middle">T (°C)</text>

  <path d="M60,190 C110,160 140,120 170,60" fill="none" stroke="var(--text)" stroke-width="2" />
  <text x="90" y="150" fill="var(--text)" font-size="12" font-weight="500" text-anchor="middle">sólido</text>
  <path d="M170,60 C220,90 260,150 300,220" fill="none" stroke="var(--text)" stroke-width="2" />
  <text x="230" y="90" fill="var(--text)" font-size="12" font-weight="500" text-anchor="middle">líquido</text>
  <path d="M170,60 C190,120 200,170 210,220" fill="none" stroke="var(--text)" stroke-width="2" stroke-dasharray="4,4" />
  <text x="310" y="170" fill="var(--text)" font-size="12" font-weight="500" text-anchor="middle">gas</text>

  <circle cx="170" cy="60" r="4" fill="var(--accent)" />
  <text x="170" y="45" fill="var(--accent)" font-size="10" font-weight="500" text-anchor="middle">punto triple: 5,11 atm, −56,6 °C</text>

  <line x1="60" y1="165" x2="380" y2="165" stroke="var(--exito)" stroke-width="2" stroke-linecap="round" stroke-dasharray="5,5" />
  <text x="360" y="158" fill="var(--exito)" font-size="11" font-weight="500" text-anchor="end">1 atm</text>
  <line x1="100" y1="165" x2="270" y2="165" stroke="var(--exito)" stroke-width="3" stroke-linecap="round" marker-end="url(#flecha)" />
  <text x="60" y="250" fill="var(--exito)" font-size="10" font-weight="500" text-anchor="start">a 1 atm: sólido → gas directo (sublimación), sin pasar por líquido</text>

</svg>