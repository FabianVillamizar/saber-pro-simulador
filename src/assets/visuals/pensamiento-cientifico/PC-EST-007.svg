<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <marker id="flecha" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--text)" />
    </marker>
  </defs>

  <text x="200" y="20" fill="var(--text-sub)" font-size="12" font-weight="500" text-anchor="middle">Todo igual excepto la variable manipulada</text>
  <rect x="30" y="40" width="150" height="130" rx="8" fill="none" stroke="var(--border)" stroke-width="2" />
  <text x="105" y="60" fill="var(--text)" font-size="12" font-weight="800" text-anchor="middle">Grupo A</text>
  <ellipse cx="105" cy="130" rx="10" ry="40" fill="none" stroke="var(--text)" stroke-width="2" />
  <line x1="105" y1="130" x2="105" y2="170" stroke="var(--text)" stroke-width="3" />
  <text x="105" y="190" fill="var(--accent)" font-size="11" font-weight="700" text-anchor="middle">+ fertilizante nuevo</text>

  <rect x="220" y="40" width="150" height="130" rx="8" fill="none" stroke="var(--border)" stroke-width="2" />
  <text x="295" y="60" fill="var(--text)" font-size="12" font-weight="800" text-anchor="middle">Grupo B (control)</text>
  <ellipse cx="295" cy="130" rx="10" ry="40" fill="none" stroke="var(--text)" stroke-width="2" />
  <line x1="295" y1="130" x2="295" y2="170" stroke="var(--text)" stroke-width="3" />
  <text x="295" y="190" fill="var(--text-sub)" font-size="11" font-weight="700" text-anchor="middle">sin fertilizante</text>

  <text x="200" y="205" fill="var(--text-faint)" font-size="10" font-weight="500" text-anchor="middle">misma especie · edad · suelo · luz · agua</text>

